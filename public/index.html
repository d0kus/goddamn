<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Telegram Mini App</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <h1>University Mini App</h1>
      <p id="status" class="status"></p>

      <section class="card">
        <h2>Пользователь</h2>
        <div id="user"></div>
      </section>

      <section class="card">
        <h2>Задачи</h2>
        <form id="task-form">
          <input id="task-input" type="text" placeholder="Новая задача" maxlength="120" required />
          <button type="submit">Добавить</button>
        </form>
        <ul id="task-list"></ul>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
